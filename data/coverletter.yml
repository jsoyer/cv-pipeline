# Cover Letter data — single source of truth
# Auto-rendered to CoverLetter.tex by scripts/render.py
# Personal info is loaded from data/cv.yml (not duplicated here)

# Theme overrides for cover letter (optional, merged with cv theme)
theme:
  geometry: "left=1.4cm, top=.8cm, right=1.4cm, bottom=1.2cm, footskip=.5cm"

recipient:
  name: Hiring Manager
  company: Company Name

title: "Application for [Position Title]"
opening: "Dear Hiring Manager,"
closing: "Best regards,"

sections:
  - title: About Me
    content: >-
      [Your introduction paragraph here.]
  - title: "Why [Company]?"
    content: >-
      [Why you want to join this company.]
  - title: Why Me?
    content: >-
      [Your key differentiators and value proposition.]

closing_paragraph: >-
  Thank you for your time and consideration. I look forward to the possibility
  of discussing how my background can contribute to the continued success of
  your organization.
