name: 🌐 Update CV Website

on:
  push:
    branches:
      - main
    paths:
      - 'CV.tex'

jobs:
  parse-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout CV repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Parse CV.tex
        run: python parse_cv.py CV.tex

      - name: Checkout website repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.WEBSITE_REPO || 'your-username/your-cv-website' }}
          path: cv-website
          token: ${{ secrets.PAT_TOKEN }}

      - name: Copy generated files to cv-website
        run: |
          cp data/*.json cv-website/data/
          cp data/_index.md cv-website/content/ 2>/dev/null || true

      - name: Commit and push changes
        working-directory: cv-website
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Update CV data from CV.tex"
          git push
